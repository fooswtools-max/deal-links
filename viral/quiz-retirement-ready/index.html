    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --primary:#2563eb;--accent:#3b82f6;
            --bg:#0f172a;--surface:#1e293b;--surface2:#334155;
            --text:#f8fafc;--text-muted:#94a3b8;
            --gradient:linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            --radius:12px;--radius-lg:20px;
        }
        html{scroll-behavior:smooth}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
             background:var(--bg);color:var(--text);line-height:1.6;
             min-height:100vh;-webkit-font-smoothing:antialiased}
        .container{max-width:720px;margin:0 auto;padding:20px 16px}
        .container-wide{max-width:960px;margin:0 auto;padding:20px 16px}
        h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;line-height:1.15;
            background:var(--gradient);-webkit-background-clip:text;
            -webkit-text-fill-color:transparent;background-clip:text}
        h2{font-size:clamp(1.3rem,3.5vw,1.8rem);font-weight:700;color:var(--text)}
        h3{font-size:1.1rem;font-weight:600;color:var(--text)}
        p{color:var(--text-muted);font-size:1rem}
        a{color:var(--accent);text-decoration:none;transition:opacity .2s}
        a:hover{opacity:.85}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;
              background:var(--gradient);color:#fff;font-weight:700;font-size:1rem;
              border:none;border-radius:var(--radius);cursor:pointer;
              transition:transform .15s,box-shadow .15s;text-decoration:none}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
        .btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
        .btn-sm{padding:8px 16px;font-size:.875rem}
        .card{background:var(--surface);border-radius:var(--radius-lg);padding:24px;
               border:1px solid var(--surface2);transition:transform .2s}
        .card:hover{transform:translateY(-3px)}
        .badge{display:inline-block;padding:4px 12px;border-radius:999px;font-size:.75rem;
                font-weight:600;background:rgba(59,130,246,.15);color:var(--accent)}
        .grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
        .grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
        .share-bar{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0}
        .share-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;
                    border-radius:var(--radius);font-weight:600;font-size:.875rem;
                    color:#fff;text-decoration:none;transition:transform .15s}
        .share-btn:hover{transform:translateY(-2px)}
        .share-btn.twitter{background:#1da1f2}
        .share-btn.facebook{background:#1877f2}
        .share-btn.linkedin{background:#0a66c2}
        .share-btn.whatsapp{background:#25d366}
        .share-btn.copy{background:var(--surface2);color:var(--text)}
        .hero{text-align:center;padding:60px 20px 40px;position:relative}
        .result-card{background:var(--surface);border:2px solid var(--primary);
                      border-radius:var(--radius-lg);padding:32px;text-align:center;
                      margin:24px 0;position:relative;overflow:hidden}
        .result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
                              background:var(--gradient)}
        .result-value{font-size:clamp(2.5rem,8vw,4rem);font-weight:900;
                       background:var(--gradient);-webkit-background-clip:text;
                       -webkit-text-fill-color:transparent;background-clip:text}
        .powered-by{text-align:center;padding:16px;font-size:.8rem;color:var(--text-muted);
                     border-top:1px solid var(--surface2);margin-top:40px}
        .powered-by a{color:var(--accent);font-weight:600}
        .embed-code{background:#0d1117;border:1px solid var(--surface2);border-radius:var(--radius);
                     padding:16px;font-family:'Fira Code',monospace;font-size:.85rem;
                     color:#e6edf3;overflow-x:auto;position:relative;margin:16px 0}
        .copy-btn{position:absolute;top:8px;right:8px;padding:4px 10px;background:var(--surface2);
                   color:var(--text);border:none;border-radius:6px;cursor:pointer;font-size:.75rem}
        .leaderboard{counter-reset:rank}
        .leaderboard-row{display:flex;align-items:center;gap:16px;padding:14px 16px;
                          border-bottom:1px solid var(--surface2)}
        .leaderboard-row::before{counter-increment:rank;content:counter(rank);
                                  font-weight:800;font-size:1.2rem;color:var(--accent);
                                  min-width:28px}
        .stat-box{text-align:center;padding:20px}
        .stat-box .value{font-size:2.2rem;font-weight:900;color:var(--accent)}
        .stat-box .label{font-size:.85rem;color:var(--text-muted)}
        .quiz-option{background:var(--surface);border:2px solid var(--surface2);
                      border-radius:var(--radius);padding:16px;cursor:pointer;
                      transition:all .2s;text-align:left}
        .quiz-option:hover,.quiz-option.selected{border-color:var(--primary);
                                                   background:rgba(37,99,235,.1)}
        .progress-bar{background:var(--surface2);border-radius:999px;height:8px;overflow:hidden}
        .progress-fill{height:100%;background:var(--gradient);border-radius:999px;
                        transition:width .5s ease}
        .video-script{background:var(--surface);border-radius:var(--radius-lg);padding:24px;
                       margin:16px 0;border-left:4px solid var(--primary)}
        .video-script .hook{font-weight:700;color:var(--accent);font-size:1.1rem}
        .video-script .body{color:var(--text-muted);margin:8px 0}
        .video-script .cta{font-weight:700;color:var(--primary)}
        @media(max-width:600px){
            .container,.container-wide{padding:16px 12px}
            .hero{padding:40px 12px 24px}
            .share-bar{flex-direction:column}
            .share-btn{justify-content:center}
        }

<body>

        <div class="container">
            <div class="hero">
                <div class="badge">AI How To Invest Quiz</div>
                <h1 style="margin-top:16px">Are You Saving Enough for Retirement?</h1>
                <p style="margin-top:8px">Answer 5 quick questions to find out.</p>
            </div>

            <div id="quiz-container">
                <div class="progress-bar" style="margin-bottom:24px"><div class="progress-fill" id="progress" style="width:20%"></div></div>
                <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:8px" id="q-counter">Question 1 of 5</p>
                <h2 id="question-text" style="margin-bottom:20px"></h2>
                <div id="options" style="display:flex;flex-direction:column;gap:10px"></div>
            </div>

            <div id="quiz-result" style="display:none">
                <div class="result-card">
                    <div id="result-emoji" style="font-size:3rem"></div>
                    <div class="result-value" id="result-title" style="font-size:clamp(1.5rem,5vw,2.2rem)"></div>
                    <p id="result-score" style="margin-top:4px;font-weight:700;color:var(--accent)"></p>
                    <p id="result-desc" style="margin-top:8px"></p>
                </div>

                <div id="result-share" style="margin-top:20px"></div>

                <div style="text-align:center;margin:32px 0">
                    <a class="btn" href="https://aihowtoinvest.com/retirement-planning-for-beginners?utm_source=quiz&utm_medium=cta&utm_campaign=viral%2Fquiz-retirement-ready">
                        Get Your Full Retirement Plan &rarr;
                    </a>
                </div>

                <div style="text-align:center">
                    <button class="btn btn-outline" onclick="startQuiz()">Retake Quiz</button>
                </div>
            </div>
        </div>

        <script>
        const questions = [{"q": "What percentage of your income do you save/invest?", "options": ["Less than 5%", "5-10%", "10-15%", "15-20%", "More than 20%"], "scores": [1, 2, 3, 4, 5]}, {"q": "Do you have an employer-matched 401(k)?", "options": ["No / Don't know", "Yes, but I don't max the match", "Yes, I max the match", "Yes, I max the full $23,500"], "scores": [1, 2, 3, 5]}, {"q": "How much do you have saved for retirement?", "options": ["Less than $10K", "$10K - $50K", "$50K - $200K", "$200K - $500K", "More than $500K"], "scores": [1, 2, 3, 4, 5]}, {"q": "What's your primary investment strategy?", "options": ["Savings account only", "Some stocks/crypto", "Target-date fund", "Diversified index funds", "I have a detailed plan"], "scores": [1, 2, 3, 4, 5]}, {"q": "When do you plan to retire?", "options": ["Before 55", "55-60", "60-65", "65-70", "After 70 / Never"], "scores": [5, 4, 3, 2, 1]}];
        const resultBands = [{"range": [5, 10], "title": "Danger Zone", "emoji": "&#128680;", "desc": "You need to take action now. Even small steps can make a big difference."}, {"range": [11, 15], "title": "Needs Work", "emoji": "&#9888;&#65039;", "desc": "You've started but there's significant room for improvement."}, {"range": [16, 20], "title": "On Track", "emoji": "&#128077;", "desc": "You're doing well! Fine-tuning could add hundreds of thousands."}, {"range": [21, 25], "title": "Retirement Ready", "emoji": "&#127775;", "desc": "You're in excellent shape. Keep it up!"}];
        let current = 0;
        let scores = [];

        function startQuiz() {
            current = 0;
            scores = [];
            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('quiz-result').style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            const q = questions[current];
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('q-counter').textContent = 'Question ' + (current+1) + ' of ' + questions.length;
            document.getElementById('progress').style.width = ((current+1)/questions.length*100) + '%';
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'quiz-option';
                div.textContent = opt;
                div.onclick = () => selectAnswer(q.scores[i]);
                opts.appendChild(div);
            });
        }

        function selectAnswer(score) {
            scores.push(score);
            current++;
            if (current < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const total = scores.reduce((a,b) => a+b, 0);
            const max = questions.length * 5;
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('quiz-result').style.display = 'block';

            let result = resultBands[resultBands.length - 1];
            for (const band of resultBands) {
                if (total >= band.range[0] && total <= band.range[1]) {
                    result = band;
                    break;
                }
            }

            document.getElementById('result-emoji').innerHTML = result.emoji;
            document.getElementById('result-title').textContent = result.title;
            document.getElementById('result-score').textContent = total + '/' + max + ' points';
            document.getElementById('result-desc').textContent = result.desc;

            // Share buttons
            const shareText = `I scored {score}/25 on the retirement readiness quiz! Are you saving enough?`.replace('{score}', total);
            const pageUrl = window.location.href;
            const enc = t => encodeURIComponent(t);
            document.getElementById('result-share').innerHTML = `
                <div class="share-bar" style="justify-content:center">
                    <a class="share-btn twitter" href="https://twitter.com/intent/tweet?text=${enc(shareText)}&url=${enc(pageUrl)}" target="_blank">Share on X</a>
                    <a class="share-btn facebook" href="https://www.facebook.com/sharer/sharer.php?u=${enc(pageUrl)}" target="_blank">Facebook</a>
                    <a class="share-btn whatsapp" href="https://api.whatsapp.com/send?text=${enc(shareText+' '+pageUrl)}" target="_blank">WhatsApp</a>
                    <button class="share-btn copy" onclick="navigator.clipboard.writeText('${shareText} ${pageUrl}');this.textContent='Copied!'">Copy</button>
                </div>
            `;
        }

        startQuiz();
        </script>
