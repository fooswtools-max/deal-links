<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tinyfinds.il — דילים לאמהות</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #fff5f5 0%, #fef3e8 100%);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    direction: rtl;
  }
  h1 {
    text-align: center;
    font-size: 1.4rem;
    color: #333;
    margin: 12px 0 4px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 16px;
  }
  .deal {
    background: #fff;
    border-radius: 16px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .deal img {
    width: 100%;
    height: 220px;
    object-fit: cover;
  }
  .info {
    padding: 14px 16px;
  }
  .name {
    font-weight: 600;
    font-size: 0.95rem;
    color: #333;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .price-row {
    margin-bottom: 6px;
  }
  .price {
    color: #00aa46;
    font-weight: 700;
    font-size: 1.3rem;
  }
  .orig {
    color: #aaa;
    text-decoration: line-through;
    font-size: 0.9rem;
    margin-right: 6px;
  }
  .usd {
    color: #999;
    font-size: 0.8rem;
  }
  .badges {
    color: #666;
    font-size: 0.8rem;
    margin-bottom: 8px;
  }
  .deal a {
    display: block;
    text-align: center;
    background: #2d9cdb;
    color: #fff;
    padding: 11px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
  }
  .deal a:active {
    background: #2480b5;
  }
  .empty {
    text-align: center;
    color: #888;
    padding: 40px 20px;
    font-size: 1rem;
  }
  .footer {
    text-align: center;
    color: #bbb;
    font-size: 0.7rem;
    margin-top: 20px;
    padding-bottom: 20px;
  }
</style>
</head>
<body>
<h1>tinyfinds.il</h1>
<div class="subtitle">דילים מטורפים לאמהות מאלי אקספרס</div>
<p class="empty">אין דילים כרגע — חזרו בקרוב!</p>
<div class="footer">עודכן: 2026-03-25 23:58 UTC · קישורי שותפים</div>
</body>
</html>
