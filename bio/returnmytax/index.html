<script>
// Click tracking
const clicks = {};
function trackClick(path, idx) {
    clicks[path] = (clicks[path] || 0) + 1;
    try {
        const data = JSON.stringify({path, idx, time: Date.now(), brand: 'returnmytax'});
        navigator.sendBeacon('/api/bio-click', data);
    } catch(e) {}
}

// Analytics: time on page
let startTime = Date.now();
window.addEventListener('beforeunload', () => {
    const duration = Math.round((Date.now() - startTime) / 1000);
    try {
        navigator.sendBeacon('/api/bio-session', JSON.stringify({
            brand: 'returnmytax', duration, clicks
        }));
    } catch(e) {}
});
</script>
